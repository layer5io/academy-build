name: Build and push to remote

on:
  workflow_dispatch:
    inputs:
      orgId:
        description: 'Organization ID (see https://cloud.layer5.io/identity/organizations for ID)'
        required: false
        type: string
      version:
        description: 'Module version (default: latest)'
        required: false
        default: 'latest'
        type: string
      academy-name:
        description: 'The name of the Academy being updated (e.g., Layer5 Academy)'
        required: false
        default: 'Academy'
        type: string
  push:
    branches:
      - master
    paths-ignore:
      - '.github/**'
      - README.md

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: 'master'

      # Required: academy-theme is a Hugo module, so the build needs Go.
      # 'make build-production' and 'make update-module' run check-go and fail fast without it.
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: make setup

      - name: Conditionally update Hugo module based on orgId
        if: ${{ github.event.inputs.orgId != '' }}
        run: |
          ORG_ID="${{ github.event.inputs.orgId }}"
          VERSION="${{ github.event.inputs.version || 'latest' }}"

          # academy_config.json stores the BARE module path (no /vN suffix). The
          # Semantic Import Versioning (SIV) suffix is derived here from the
          # target version, so no academy needs to be hand-tagged with /v2.
          BASE=$(jq -r --arg orgId "$ORG_ID" '.orgToModuleMapping[$orgId].module' academy_config.json)

          if [ "$BASE" = "null" ] || [ -z "$BASE" ]; then
            echo "❌ Module not found for orgId: $ORG_ID"
            exit 1
          fi
          # Defensively strip a legacy /vN suffix so either config form works.
          BASE="${BASE%/v[0-9]*}"

          # Resolve "latest" to a concrete tag. Go/Hugo module resolution never
          # crosses a major-version boundary on a bare path, so we must learn the
          # real major before we can construct the import path.
          if [ "$VERSION" = "latest" ] || [ -z "$VERSION" ]; then
            VERSION=$(git ls-remote --tags --refs "https://${BASE}.git" \
              | sed -E 's#.*refs/tags/##' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -n1)
            if [ -z "$VERSION" ]; then
              echo "❌ Could not resolve a latest semver tag for $BASE"
              exit 1
            fi
            echo "Resolved latest -> $VERSION"
          fi

          # Derive the SIV-correct import path:
          #   major >= 2 -> <base>/vN  (required by Go)
          #   major 0|1  -> <base>     (no suffix)
          MAJOR="${VERSION#v}"; MAJOR="${MAJOR%%.*}"
          if [ "${MAJOR:-0}" -ge 2 ] 2>/dev/null; then
            MODULE="${BASE}/v${MAJOR}"
          else
            MODULE="$BASE"
          fi
          echo "✅ orgId '$ORG_ID' -> import '$MODULE' @ '$VERSION'"

          # Set environment variables for later steps (academy name = repo name).
          echo "ACADEMY_NAME=${BASE##*/}" >> $GITHUB_ENV
          echo "NOTES=Updated from academy-build workflow" >> $GITHUB_ENV

          # Keep hugo.yaml's mount import path in sync with the derived path.
          # Match this module's "- path: <base>[/vN]" line and rewrite it.
          ESC_BASE=$(printf '%s' "$BASE" | sed -e 's/[.[\*^$/]/\\&/g')
          sed -i -E "s|^([[:space:]]*- path: )${ESC_BASE}(/v[0-9]+)?[[:space:]]*\$|\1${MODULE}|" hugo.yaml

          make update-module module="$MODULE" version="$VERSION"
          make update-org-to-module-version orgId="$ORG_ID" version="$VERSION"

      - name: Set default environment variables
        if: ${{ github.event.inputs.orgId == '' }}
        run: |
          echo "ACADEMY_NAME=Layer5 Academy" >> $GITHUB_ENV
          echo "NOTES=Manual build from academy-build workflow" >> $GITHUB_ENV

      - name: Ensure environment variables are set
        run: |
          # Set defaults if variables are not already set
          echo "ACADEMY_NAME=${ACADEMY_NAME:-Layer5 Academy}" >> $GITHUB_ENV
          echo "NOTES=${NOTES:-Build from academy-build workflow}" >> $GITHUB_ENV

      - name: Build Academy
        run: make build-production

      - name: Pull changes from self master
        run: git pull origin master

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build Academy
          commit_options: '--signoff'
          branch: master
          commit_user_name: l5io
          commit_user_email: l5io@layer5.io
          commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>

      - name: Checkout meshery-cloud repo
        uses: actions/checkout@v6
        with:
          repository: layer5io/meshery-cloud
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          path: meshery-cloud
          ref: master

      - name: Copy build output to /academy
        run: |
          rm -rf meshery-cloud/academy
          mkdir -p meshery-cloud/academy
          rsync -av --delete public/ meshery-cloud/academy/
          cp academy_config.json meshery-cloud/academy/

      - name: Create PR in meshery-cloud for release-drafter integration
        if: github.event.inputs.version != ''
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          path: meshery-cloud
          commit-message: "[Academy] Academy content update v${{ github.event.inputs.version }}"
          # committer: l5io
          signoff: true
          title: "${{ inputs.academy-name || github.event.inputs.academy-name }} ${{ github.event.inputs.version }} content update"
          body: "Automated PR for ${{ inputs.academy-name || github.event.inputs.academy-name }} ${{ github.event.inputs.version }}  (organization: ${{ github.event.inputs.orgId || 'manual' }})."
          # branch: academy-${{ github.event.inputs.version }}-${{ github.run_number }}
          labels: academy
          delete-branch: true

      - name: Enable auto-merge for PR in meshery-cloud repo
        if: github.event.inputs.version != '' && steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: merge
          repository: layer5io/meshery-cloud
